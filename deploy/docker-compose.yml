# GovProcu MCP Server — 로컬/사내 운영
services:
  mcp:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: govprocu-mcp:latest
    restart: unless-stopped
    env_file: ../.env
    environment:
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  redis_data:
